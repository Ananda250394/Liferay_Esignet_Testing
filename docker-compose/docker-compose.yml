services:
  database:
    image: 'postgres:bookworm'
    ports:
      - 5455:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:6.0
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always

  mock-identity-system:
    image: 'mosipid/mock-identity-system:0.12.0'
    restart: always 
    user: root
    ports:
      - 8082:8082
    volumes:
      - ./mock-identity-system.properties:/home/mosip/mock-identity-system.properties
    environment:
      - container_user=mosip
      - active_profile_env=local
      - MOSIP_MOCK_IDA_KBI_DEFAULT_FIELD_LANGUAGE=eng
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/mosip_mockidentitysystem?currentSchema=mockidentitysystem
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MOSIP_MOCK_IDA_KYC_TRANSACTION_TIMEOUT_SECS=900
      - MOSIP_ESIGNET_HOST=localhost:8088
      - loader_path_env=/home/mosip/additional_jars/
      - spring_config_url_env=
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/home/mosip/mock-identity-system.properties
      - SPRING_REDIS_HOST=redis-server
      - SPRING_REDIS_PASSWORD=
    depends_on:
      - database

  esignet:
    image: 'mosipid/esignet-with-plugins:1.7.1'
    user: root
    restart: always 
    ports:
      - 8088:8088
    environment:
      - container_user=mosip
      - active_profile_env=default,local
      - plugin_name_env=esignet-mock-plugin.jar
      - MOSIP_ESIGNET_DATABASE_URL=jdbc:postgresql://database:5432/mosip_esignet?currentSchema=esignet
      - MOSIP_ESIGNET_DATABASE_USERNAME=postgres
      - MOSIP_ESIGNET_DATABASE_PASSWORD=postgres
      - MOSIP_ESIGNET_MOCK_DOMAIN_URL=http://mock-identity-system:8082
      - MOSIP_ESIGNET_INTEGRATION_KEY_BINDER=MockKeyBindingWrapperService
      - SPRING_CACHE_TYPE=redis
      - SPRING_REDIS_HOST=redis-server
      - SPRING_REDIS_PASSWORD=
      - KAFKA_ENABLED=false
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - MOSIP_ESIGNET_DOMAIN_URL=http://localhost:3000
    volumes:
      - esignet-hsm:/home/mosip/hsm-client
    depends_on:
      - database
      - mock-identity-system
      - redis

  esignet-ui:
     image: 'mosipid/oidc-ui:1.7.1'
     user: root
     restart: always
     ports:
      - 3000:3000
     environment:
      - container_user=mosip
      - DEFAULT_WELLKNOWN=%5B%7B%22name%22%3A%22OpenID%20Configuration%22%2C%22value%22%3A%22%2F.well-known%2Fopenid-configuration%22%7D%2C%7B%22name%22%3A%22Jwks%20Json%22%2C%22value%22%3A%22%2F.well-known%2Fjwks.json%22%7D%2C%7B%22name%22%3A%22Authorization%20Server%22%2C%22value%22%3A%22%2F.well-known%2Foauth-authorization-server%22%7D%5D
      - SIGN_IN_WITH_ESIGNET_PLUGIN_URL=https://raw.githubusercontent.com/mosip/artifactory-ref-impl/master/artifacts/src/mosip-plugins/sign-in-with-esignet/sign-in-with-esignet.zip
     entrypoint:
      - sh
      - -c
      - |
        mkdir -p /usr/share/nginx/html/plugins/temp
        wget --no-check-certificate -q "https://raw.githubusercontent.com/mosip/artifactory-ref-impl/master/artifacts/src/mosip-plugins/sign-in-with-esignet/sign-in-with-esignet.zip" -O /usr/share/nginx/html/plugins/temp/sign-in-button-plugin.zip
        awk '{gsub(/\\n/,"\n")}1' /home/mosip/configure_start.sh | sed "s/xargs sed -i.. /xargs sed -i /g" > /tmp/cs_fixed.sh
        chmod +x /tmp/cs_fixed.sh
        cd /home/mosip && sh /tmp/cs_fixed.sh
        sed -i 's/esignet\.esignet/esignet:8088/g' /etc/nginx/nginx.conf
        nginx -g 'daemon off;'
     volumes:
      - ./fixed_configure_start.sh:/home/mosip/configure_start.sh
     depends_on:
      - esignet

volumes:
  esignet-hsm:
